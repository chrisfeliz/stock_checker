name: Test email alert

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  send-test-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send test email
        env:
          SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
          SMTP_RECEIVER: ${{ secrets.SMTP_RECEIVER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          ALERT_SUBJECT: "Test: Stock checker email alert"
          ALERT_BODY: |
            This is a test email from your GitHub Actions stock checker.
            If you received this, SMTP secrets are configured correctly.
        run: |
          python send_email.py
